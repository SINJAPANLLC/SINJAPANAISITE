server {
    listen 80;
    server_name sinjapanai.site www.sinjapanai.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sinjapanai.site www.sinjapanai.site;

    ssl_certificate     /etc/letsencrypt/live/sinjapanai.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sinjapanai.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/sinjapanaisite/artifacts/company-website/dist/public;
    index index.html;

    # API proxy → sinjapanaisite-api (port 4000)
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
